    <!-- Critical inline CSS — paint instantly before JS loads -->

      *,::before,::after{box-sizing:border-box;margin:0;padding:0}

      /* Hero skeleton — prevents blank screen flash */
      #hero-skeleton{
        position:fixed;inset:0;z-index:9999;
        background:linear-gradient(135deg,#1a1a18 0%,#2d2d2a 50%,#111110 100%);
        display:flex;align-items:center;justify-content:center;
        transition:opacity 0.4s ease;
      }
      #hero-skeleton.hidden{opacity:0;pointer-events:none}
      .hs-pulse{
        width:48px;height:48px;border-radius:50%;
        background:rgba(192,123,26,0.6);
        animation:hsPulse 1.2s ease-in-out infinite;
      }
      @keyframes hsPulse{
        0%,100%{transform:scale(0.85);opacity:0.5}
        50%{transform:scale(1.15);opacity:1}
      }
