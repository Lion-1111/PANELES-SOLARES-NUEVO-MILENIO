    <!-- Critical inline CSS — paint instantly before JS loads -->
    <style>
      *,::before,::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth}
      body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#111110;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      /* Prevent layout shift while fonts load */
      h1,h2,h3{font-family:'Montserrat',system-ui,sans-serif;font-weight:800}
      /* ── Premium Loader ─────────────────────────────── */
      #hero-skeleton {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: all;
      }
      /* Two curtain panels */
      .curtain {
        position: absolute;
        inset: 0;
        background: #0c0e14;
        transition: transform 0.85s cubic-bezier(0.76, 0, 0.24, 1);
      }
      .curtain-top    { clip-path: inset(0 0 50% 0); transform-origin: top; }
      .curtain-bottom { clip-path: inset(50% 0 0 0); transform-origin: bottom; }

      /* Hidden state — curtains fly off */
      #hero-skeleton.hidden .curtain-top    { transform: translateY(-100%); }
      #hero-skeleton.hidden .curtain-bottom { transform: translateY(100%);  }
      #hero-skeleton.hidden { pointer-events: none; }

      /* Content sits above curtains */
      .loading-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        transition: opacity 0.4s ease 0.1s, transform 0.5s ease 0.1s;
      }
      #hero-skeleton.hidden .loading-container {
        opacity: 0;
        transform: scale(1.08);
      }

      /* Sun */
      .sun-glow {
        position: relative;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .sun-glow::after {
        content: '';
        position: absolute;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(192,123,26,0.18) 0%, transparent 70%);
        animation: pulse-glow 2.2s infinite ease-in-out;
      }
      .premium-sun {
        animation: rotate-sun 10s linear infinite;
        filter: drop-shadow(0 0 10px rgba(192,123,26,0.4));
      }

      /* Typography */
      .brand-text {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 800;
        font-size: 22px;
        color: #fff;
        letter-spacing: 5px;
        margin-bottom: 4px;
      }
      .brand-subtext {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 500;
        font-size: 10px;
        color: #C07B1A;
        letter-spacing: 7px;
        margin-left: 7px;
        margin-bottom: 32px;
        opacity: 0.85;
      }

      /* Progress bar */
      .loading-bar {
        width: 100px;
        height: 1.5px;
        background: rgba(255,255,255,0.07);
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-bar-progress {
        width: 45%;
        height: 100%;
        background: linear-gradient(90deg, #C07B1A, #f0a832);
        border-radius: 2px;
        animation: loading-slide 1.6s infinite ease-in-out;
      }

      /* Keyframes */
      @keyframes pulse-glow {
        0%,100% { transform: scale(0.9);  opacity: 0.5; }
        50%      { transform: scale(1.15); opacity: 1;   }
      }
      @keyframes rotate-sun {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      @keyframes loading-slide {
        0%   { transform: translateX(-140%); opacity: 1;   }
        60%  { transform: translateX(280%);  opacity: 1;   }
        61%  { transform: translateX(280%);  opacity: 0;   }
        62%  { transform: translateX(-140%); opacity: 0;   }
        63%  { opacity: 1; }
        100% { transform: translateX(-140%); opacity: 1;   }
      }
    </style>
